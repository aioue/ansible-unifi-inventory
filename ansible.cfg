# Example Ansible Configuration for UniFi Inventory Plugin
#
# Copy this file to your project root as ansible.cfg or merge with existing configuration

[defaults]
# Set default inventory to use the UniFi plugin
inventory = ./examples/unifi.yaml

# If keeping plugin in custom location (not ~/.ansible/plugins/inventory/)
# Uncomment and adjust path as needed:
# inventory_plugins = ./plugins/inventory

# Host key checking can be disabled for dynamic environments
# Uncomment if needed:
# host_key_checking = False

[inventory]
# Enable the unifi inventory plugin
# The plugin must be listed here for Ansible to recognize it
enable_plugins = host_list, script, auto, yaml, ini, toml, unifi

# Cache plugin results to improve performance
# Uncomment to enable inventory caching:
# cache = yes
# cache_plugin = jsonfile
# cache_timeout = 30
# cache_connection = ./.cache
