name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core aiounifi aiohttp pytest
          pip install -r tests/unit/requirements.txt
          ansible-galaxy collection install community.library_inventory_filtering_v1 \
            -p tests/_ansible_collections --force

      - name: Build and install collection
        run: |
          mkdir -p dist
          ansible-galaxy collection build --output-path dist/
          ansible-galaxy collection install dist/*.tar.gz --force

      - name: Run unit tests
        run: pytest tests/unit/ -q
